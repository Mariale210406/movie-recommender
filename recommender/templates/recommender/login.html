<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>CineAI – Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
input,button{font-family:'Inter',sans-serif}
a{text-decoration:none}
.page-header{position:fixed;top:0;left:0;right:0;height:64px;background:#111;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;justify-content:center;z-index:100}
.logo-cam{height:50px;object-fit:contain}
.card{background:#111;border:1px solid #2a2a2a;border-radius:14px;padding:40px 36px;width:100%;max-width:400px;margin-top:80px;margin-bottom:40px}
.card-title{font-size:1.25rem;font-weight:700;text-align:center;margin-bottom:6px}
.card-sub{font-size:0.85rem;color:#666;text-align:center;margin-bottom:28px}
.form-group{margin-bottom:16px}
label{display:block;font-size:0.82rem;color:#888;margin-bottom:5px}
.field{width:100%;padding:11px 14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-size:0.93rem;outline:none;transition:border-color 0.2s}
.field:focus{border-color:#FFD700}
.field::placeholder{color:#444}
.btn-main{width:100%;padding:12px;background:#E50914;color:#fff;border:none;border-radius:8px;font-size:0.97rem;font-weight:600;cursor:pointer;margin-top:6px;transition:background 0.2s}
.btn-main:hover{background:#cc0812}
.divider{text-align:center;color:#333;margin:18px 0;font-size:0.83rem}
.btn-alt{width:100%;padding:11px;background:transparent;color:#FFD700;border:1px solid #FFD700;border-radius:8px;font-size:0.93rem;font-weight:600;cursor:pointer;display:block;text-align:center;transition:all 0.2s}
.btn-alt:hover{background:#FFD700;color:#000}
.error-box{background:#200;border:1px solid #E50914;border-radius:8px;padding:10px 14px;font-size:0.83rem;color:#ff7070;margin-bottom:14px}
.field-error{background:#200;border:1px solid #E50914;border-radius:6px;padding:6px 10px;font-size:0.78rem;color:#ff7070;margin-top:4px}
</style>
</head>

<div class="card">
  <div class="card-title">Bienvenido de vuelta</div>
  <div class="card-sub">Inicia sesión para continuar</div>

  <div class="error-box">Usuario o contraseña incorrectos. Intenta de nuevo.</div>
  {% endif %}
  <form method="POST">{% csrf_token %}
    <div class="form-group">
      <label>Usuario</label>
      <input class="field" type="text" name="username" placeholder="Tu usuario" autofocus>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input class="field" type="password" name="password" placeholder="Tu contraseña">
    </div>
    <button class="btn-main" type="submit">Iniciar Sesión</button>
  </form>
  <div class="divider">¿No tienes cuenta?</div>

</div>
